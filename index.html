<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{

background:url(background.jpg) center/cover no-repeat;
height:100vh;

display:flex;
justify-content:flex-end;
align-items:center;

padding-bottom:40px;

overflow:hidden;

.links{

display:flex;
flex-direction:column;

gap:14px;

margin-top:350px;

padding-bottom:20px;

}

.card{

width:85%;
max-width:390px;
height:58px;

margin:auto;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 16px;

border-radius:40px;

text-decoration:none;
color:#fff;

background:rgba(255,255,255,.10);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 6px 18px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.25);

position:relative;
overflow:hidden;

transition:.3s;

}

.card::before{

content:"";

position:absolute;

left:-120%;
top:0;

width:70%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.45),
transparent
);

transform:skewX(-25deg);

transition:.8s;

}

.card:hover::before{

left:130%;

}

.card:hover{

transform:translateY(-2px);

box-shadow:

0 10px 25px rgba(0,0,0,.45),
0 0 18px rgba(255,215,120,.25);

}
  
.card::before{

content:"";

position:absolute;

left:-70%;

top:-50%;

width:60%;
height:220%;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.45),

transparent

);

transform:rotate(22deg);

transition:1s;

}

.card:hover::before{

left:140%;

}

.card::after{

content:"";

position:absolute;

inset:0;

border-radius:50px;

padding:1px;

background:

linear-gradient(

135deg,

rgba(255,255,255,.8),

rgba(255,255,255,.05),

rgba(255,210,110,.8)

);

-webkit-mask:

linear-gradient(#000 0 0) content-box,

linear-gradient(#000 0 0);

-webkit-mask-composite:xor;

pointer-events:none;

}

.card:hover{

transform:translateY(-3px) scale(1.01);

box-shadow:

0 18px 40px rgba(0,0,0,.45),

0 0 35px rgba(60,170,255,.25),

0 0 15px rgba(255,210,120,.35);

}

.icon{

width:42px;
height:42px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:20px;

flex-shrink:0;
