<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{

background:url(background.jpg) center/cover no-repeat;
height:100vh;

display:flex;
justify-content:flex-end;
align-items:center;

padding-bottom:40px;

overflow:hidden;

}

.links{

width:100%;
padding:0 18px;

display:flex;
flex-direction:column;

gap:18px;

}

.card{

position:relative;

display:flex;
align-items:center;

height:78px;

padding:0 24px;

border-radius:50px;

overflow:hidden;

text-decoration:none;

color:white;

background:

linear-gradient(180deg,
rgba(255,255,255,.18),
rgba(255,255,255,.05));

backdrop-filter:blur(22px) saturate(180%);
-webkit-backdrop-filter:blur(22px) saturate(180%);

border:1px solid rgba(255,255,255,.22);

box-shadow:

inset 0 1px 1px rgba(255,255,255,.45),

0 10px 30px rgba(0,0,0,.35),

0 0 20px rgba(70,150,255,.18);

transition:.45s;

}

.card::before{

content:"";

position:absolute;

left:-70%;

top:-50%;

width:60%;
height:220%;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.45),

transparent

);

transform:rotate(22deg);

transition:1s;

}

.card:hover::before{

left:140%;

}

.card::after{

content:"";

position:absolute;

inset:0;

border-radius:50px;

padding:1px;

background:

linear-gradient(

135deg,

rgba(255,255,255,.8),

rgba(255,255,255,.05),

rgba(255,210,110,.8)

);

-webkit-mask:

linear-gradient(#000 0 0) content-box,

linear-gradient(#000 0 0);

-webkit-mask-composite:xor;

pointer-events:none;

}

.card:hover{

transform:translateY(-3px) scale(1.01);

box-shadow:

0 18px 40px rgba(0,0,0,.45),

0 0 35px rgba(60,170,255,.25),

0 0 15px rgba(255,210,120,.35);

}

.icon{

width:58px;
height:58px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

margin-left:18px;

flex-shrink:0;

box-shadow:

0 0 18px rgba(255,255,255,.12);

}

.facebook{background:#1877F2;}
.tiktok{background:#000;}
.instagram{

background:

linear-gradient(45deg,

#F58529,

#DD2A7B,

#8134AF,

#515BD4);

}

.youtube{background:#FF0000;}
.whatsapp{background:#25D366;}

.title{

font-size:29px;
font-weight:700;

}

.spacer{

flex:1;

height:34px;

border-right:1px solid rgba(255,255,255,.15);

margin:0 24px;

}

.phone{

color:#F6C76C;

font-size:22px;

font-weight:bold;

}

.arrow{

font-size:32px;

color:#F6C76C;

text-shadow:

0 0 12px #f6c76c;

}

</style>
